name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        run: pnpm rebuild esbuild @swc/core @biomejs/biome

      - name: Create Release PR or Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run — changesets status:"
          pnpm changeset status
          echo "Packages that would be published:"
          for pkg in packages/core packages/cli packages/create-fyron-app; do
            name=$(node -p "require('./$pkg/package.json').name")
            ver=$(node -p "require('./$pkg/package.json').version")
            echo "  $name@$ver"
          done

      - name: Create Release PR or Publish
        if: ${{ !inputs.dry_run }}
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
