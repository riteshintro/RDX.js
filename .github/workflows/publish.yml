name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        run: pnpm rebuild esbuild @swc/core

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Publish avor
        if: ${{ !inputs.dry_run }}
        run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/avor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @avor/cli
        if: ${{ !inputs.dry_run }}
        run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-avor-app
        if: ${{ !inputs.dry_run }}
        run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/create-avor-app
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run — would have published:"
          for pkg in packages/avor packages/cli packages/create-avor-app; do
            name=$(node -p "require('./$pkg/package.json').name")
            ver=$(node -p "require('./$pkg/package.json').version")
            echo "  $name@$ver"
          done
